services:
  db:
    image: pgvector/pgvector:pg16
    container_name: passly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: superdata
      POSTGRES_DB: auth_app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Limit memory for low-end devices (4GB RAM systems)
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=256MB
      -c max_connections=20
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: node:20-alpine
    container_name: passly-migrate
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:superdata@db:5432/auth_app
    command: sh -c "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm db:migrate"
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  embedding:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: passly-embedding
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      TORCH_THREADS: '2'
      EMBED_MAX_BATCH_SIZE: '64'
      OMP_NUM_THREADS: '2'
      MKL_NUM_THREADS: '2'
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
